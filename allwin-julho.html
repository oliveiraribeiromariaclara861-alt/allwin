const SUPABASE_URL = 'https://ynahmfqywuykbglebasn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hSWqz8N5FcbMMbnTlPKEvw_3qd8tbBU';
const USER_ID = 'maria_clara';

let done = {};
let filter = 'all';
let saving = false;

async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/progress?id=eq.${USER_ID}&select=done`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    if (data && data[0] && data[0].done) {
      done = data[0].done;
    }
  } catch(e) {
    console.error('Erro ao carregar:', e);
  }
  render();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('calendar').style.display = 'block';
}

async function saveToSupabase() {
  if (saving) return;
  saving = true;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/progress?id=eq.${USER_ID}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ done })
    });
  } catch(e) {
    console.error('Erro ao salvar:', e);
  }
  saving = false;
}

function key(d, h) { return d + '_' + h; }

function toggle(dayIdx, hookIdx) {
  const k = key(dayIdx, hookIdx);
  done[k] = !done[k];
  render();
  saveToSupabase();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleDay(id) {
  const el = document.getElementById('hooks_' + id);
  const ch = document.getElementById('chev_' + id);
  el.classList.toggle('open');
  ch.classList.toggle('open');
}

async function resetAll() {
  if (confirm('Reiniciar todo o progresso?')) {
    done = {};
    render();
    await saveToSupabase();
  }
}

function render() {
  const total = DAYS.reduce((a, d) => a + d.hooks.length, 0);
  const doneCount = Object.values(done).filter(Boolean).length;
  const pct = Math.round((doneCount / total) * 100);

  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('s-done').textContent = doneCount;
  document.getElementById('s-left').textContent = total - doneCount;

  const activeDays = DAYS.filter((d, i) =>
    d.hooks.some((_, j) => done[key(i, j)])
  ).length;
  document.getElementById('s-days').textContent = activeDays;

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  DAYS.forEach((day, di) => {
    const dayDone = day.hooks.filter((_, hi) => done[key(di, hi)]).length;
    const allDone = dayDone === day.hooks.length;
    const hasAny = dayDone > 0;

    if (filter === 'done' && dayDone === 0) return;
    if (filter === 'club' && !day.club) return;

    const block = document.createElement('div');
    block.className = 'day-block';

    const dots = day.hooks.map((_, hi) =>
      `<div class="mini-dot${done[key(di, hi)] ? ' done' : ''}"></div>`
    ).join('');

    block.innerHTML = `
      <div class="day-header" onclick="toggleDay(${di})">
        <div class="day-header-left">
          <div>
            <div class="day-date">${day.date}</div>
            <div class="day-label">${day.label}${day.club ? '' : ''}</div>
          </div>
          ${day.club ? '<span class="club-badge">Club</span>' : ''}
        </div>
        <div class="day-progress-mini">
          <div class="mini-dots">${dots}</div>
          <span class="chevron" id="chev_${di}">›</span>
        </div>
      </div>
      <div class="hooks-list" id="hooks_${di}">
        ${day.hooks.map((hook, hi) => {
          const isDone = done[key(di, hi)];
          const isClub = day.club && hi === 4;
          return `
            <div class="hook-item${isClub ? ' club-hook' : ''}" onclick="toggle(${di}, ${hi})">
              <div class="hook-check${isDone ? ' done' : ''}"></div>
              <div class="hook-text${isDone ? ' done' : ''}">${hook}</div>
              <div class="hook-number">${hi + 1}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    cal.appendChild(block);
  });
}

loadFromSupabase();
